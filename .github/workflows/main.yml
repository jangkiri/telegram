name: Telegram to GitHub Repo (Split & Push)

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'لینک دانلود تلگرام'
        required: true
      file_name:
        description: 'نام فایل (مثلاً video.mp4)'
        required: true
        default: 'video.mp4'

jobs:
  download-split-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Create Unique Download Directory
        run: |
          # ساخت یک پوشه جدید با نامی که شامل شماره اجرای فعلی است
          mkdir -p "downloads_${{ github.run_number }}"

      - name: Download File
        run: |
          # دانلود فایل در پوشه جدید
          wget -O "downloads_${{ github.run_number }}/${{ github.event.inputs.file_name }}" "${{ github.event.inputs.file_url }}"

      - name: Split File into 90MB Parts
        run: |
          # ورود به پوشه اختصاصی همین اجرا
          cd "downloads_${{ github.run_number }}"
          
          # فایل را به قطعات ۹۰ مگابایتی تقسیم کن
          split -b 90M "${{ github.event.inputs.file_name }}" "${{ github.event.inputs.file_name }}.part_"
          
          # فایل اصلی را پاک کن تا حجم مخزن بیهوده پر نشود
          rm "${{ github.event.inputs.file_name }}"

      - name: Commit and Push Parts
        run: |
          # اضافه کردن فقط محتویات پوشه جدید به گیت
          git add "downloads_${{ github.run_number }}/*"
          
          # کامیت کردن و پوش به مخزن
          git commit -m "Add split file: ${{ github.event.inputs.file_name }} (Run #${{ github.run_number }})"
          git push
