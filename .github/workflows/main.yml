name: Telegram to GitHub Repo (Split & Push)

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'لینک دانلود تلگرام'
        required: true
      file_name:
        description: 'نام فایل (مثلاً video.mp4)'
        required: true
        default: 'video.mp4'

jobs:
  download-split-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Create Download Directory
        run: mkdir -p downloads

      - name: Download File
        run: |
          wget -O "downloads/${{ github.event.inputs.file_name }}" "${{ github.event.inputs.file_url }}"

      - name: Split File into 90MB Parts
        run: |
          cd downloads
          # فایل را به قطعات ۹۰ مگابایتی تقسیم کن
          split -b 90M "${{ github.event.inputs.file_name }}" "${{ github.event.inputs.file_name }}.part_"
          # فایل اصلی را پاک کن تا حجم مخزن بیهوده پر نشود
          rm "${{ github.event.inputs.file_name }}"

      - name: Commit and Push Parts
        run: |
          git add downloads/*
          git commit -m "Add downloaded and split file: ${{ github.event.inputs.file_name }}"
          git push
